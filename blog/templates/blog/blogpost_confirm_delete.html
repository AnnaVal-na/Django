{% extends "blog/base_blog.html" %}

{% block blog_content %}
<div class="card">
    <div class="card-header bg-danger text-white">
        <h2>Подтверждение удаления</h2>
    </div>

    <div class="card-body">
        <p>Вы уверены, что хотите удалить запись <strong>"{{ object.title }}"</strong>?</p>
        <p class="text-muted">Это действие нельзя будет отменить.</p>

        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'blog:detail' object.pk %}" class="btn btn-secondary">
                    Отмена
                </a>
                <button type="submit" class="btn btn-danger">
                    Да, удалить
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
