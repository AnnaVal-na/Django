{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="card border-danger">
        <div class="card-header bg-danger text-white">
            <h2 class="mb-0">Подтверждение удаления</h2>
        </div>
        <div class="card-body">
            <p class="fs-5">Вы уверены, что хотите удалить продукт <strong>"{{ object.name }}"</strong>?</p>
            <p class="text-muted">Это действие нельзя отменить.</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-trash"></i> Удалить
                    </button>
                    <a href="{% url 'catalog:product_detail' object.pk %}" class="btn btn-secondary px-4">
                        <i class="bi bi-x-circle"></i> Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
