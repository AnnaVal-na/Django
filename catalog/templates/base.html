{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Магазин{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Собственный CSS -->
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>

<header class="bg-dark text-white p-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="#" class="text-white text-decoration-none fs-4">Мой Магазин</a>
        <nav>
            <ul class="d-flex gap-3 list-unstyled m-0">
                <li><a href="{% url 'home' %}" class="text-white text-decoration-none">Главная</a></li>
                <li><a href="{% url 'contacts' %}" class="text-white text-decoration-none">Контакты</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="container">
    {% block content %}
    {% endblock %}
</main>

<footer class="py-4 bg-light mt-5">
    <div class="container text-center text-muted">
        &copy; 2025 Мой Магазин
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
