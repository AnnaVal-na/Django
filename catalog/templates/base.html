{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Мета-теги ДОЛЖНЫ быть в начале head -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Магазин{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <!-- Убрал пробел в URL (было "bootstrap @5.3.3") -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Собственный CSS -->
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    <!-- Header должен быть внутри body, а не в head -->
    <header class="bg-dark text-white p-3 mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="#" class="text-white text-decoration-none fs-4">Мой Магазин</a>
            {% include 'partials/menu.html' %}  <!-- Убедитесь, что путь правильный -->
        </div>
    </header>

    <!-- Основной контент -->
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Футер -->
    <footer class="py-4 bg-light mt-5">
        <div class="container text-center text-muted">
            &copy; 2025 Мой Магазин
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
