{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="product-list">
  {% for product in products %}
    <div class="product-card">
      <h2>{{ product.name }}</h2>
      {% if product.image %}  <!-- Добавлена проверка -->
        <img src="{{ product.image.url }}" alt="{{ product.name }}" />
      {% else %}
        <img src="{% static 'images/no-image.png' %}" alt="No image" />  <!-- Запасное изображение -->
      {% endif %}
      <p>{{ product.description|truncatechars:100 }}</p>
      <a href="{% url 'catalog:product_detail' product.pk %}">Подробнее →</a>
    </div>
  {% endfor %}
</div>
{% endblock %}%}
