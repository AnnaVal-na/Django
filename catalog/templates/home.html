{% extends "base.html" %}
{% load static %}
{% block content %}
  <div class="product-list">
    {% for product in products %}
      <div class="product-card">
        <h2>{{ product.name }}</h2>
        <img src="{{ product.image.url }}" alt="{{ product.name }}" />
        <p>{{ product.description|truncatechars:100 }}</p>
        <a href="{% url 'product_detail' product.pk %}">Подробнее →</a>
      </div>
    {% endfor %}
  </div>
{% endblock %}
