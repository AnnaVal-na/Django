{% extends "base.html" %}
{% load static %}
{% block content %}
  <div class="product-detail">
    <h1>{{ product.name }}</h1>
    <img src="{{ product.image.url }}" alt="{{ product.name }}" />
    <p>{{ product.description }}</p>
    <p><strong>Цена:</strong> {{ product.price }} руб.</p>
    <a href="{% url 'home' %}">← Назад к списку товаров</a>
  </div>
{% endblock %}
